<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Driver Dashboard</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4b36e7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131121",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1E1E1E",
                        "danger": "#ef4444",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased transition-colors duration-200">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl">
<!-- Header -->
<header class="flex items-center justify-between p-4 pb-2 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<div class="flex flex-col">
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Bus 104 - Route A</h2>
<span class="text-slate-500 dark:text-slate-400 text-sm">Campus Loop</span>
</div>
<div class="flex items-center gap-2">
<!-- Navigation Toggle -->
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-200 dark:bg-[#2b2938] text-primary hover:bg-slate-300 dark:hover:bg-[#3f3c53] transition-colors">
<span class="material-symbols-outlined">navigation</span>
</button>
</div>
</header>
<!-- Status Chips -->
<div class="flex px-4 py-2 gap-3 items-center">
<div class="flex h-8 items-center justify-center gap-x-2 rounded-full bg-green-500/10 dark:bg-green-500/20 px-3 border border-green-500/20">
<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
<p class="text-green-700 dark:text-green-400 text-sm font-semibold leading-normal">On Route</p>
</div>
<div class="flex h-8 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-[#2b2938] px-4">
<span class="material-symbols-outlined text-[18px] text-slate-500 dark:text-slate-400">schedule</span>
<p class="text-slate-700 dark:text-white text-sm font-medium leading-normal">10:42 AM</p>
</div>
</div>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-4 pt-2 gap-5 pb-24 overflow-y-auto">
<!-- Active Route Card -->
<div class="w-full">
<div class="relative flex flex-col items-stretch justify-start rounded-xl overflow-hidden shadow-lg bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-800">
<!-- Map Visual Context -->
<div class="relative h-48 w-full bg-slate-800">
<div class="absolute inset-0 bg-cover bg-center opacity-80" data-alt="Map showing route path and current location pin" data-location="University Campus Map" style='background-image: url("https://placeholder.pics/svg/300");'>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-surface-light dark:from-surface-dark to-transparent"></div>
<!-- Floating Badge on Map -->
<div class="absolute top-3 left-3 bg-primary text-white text-xs font-bold px-3 py-1 rounded-full shadow-md uppercase tracking-wider">
                            Next Stop
                        </div>
</div>
<div class="relative px-5 pb-6 -mt-12 flex flex-col gap-4">
<div class="flex flex-col gap-1">
<h1 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight tracking-tight drop-shadow-sm">Engineering Library</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg font-medium">Estimated arrival in <span class="text-primary font-bold">3 mins</span></p>
</div>
<!-- Progress Bar -->
<div class="flex flex-col gap-2 mt-2">
<div class="flex justify-between items-end">
<span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Distance</span>
<span class="text-sm font-bold text-slate-700 dark:text-slate-200">0.5 miles</span>
</div>
<div class="h-3 w-full rounded-full bg-slate-200 dark:bg-[#3f3c53] overflow-hidden">
<div class="h-full rounded-full bg-primary shadow-[0_0_10px_rgba(75,54,231,0.5)]" style="width: 75%;"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Upcoming Stops List -->
<div class="flex flex-col gap-3">
<h3 class="text-slate-500 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider px-1">Upcoming Stops</h3>
<div class="flex flex-col gap-2">
<!-- Stop Item 1 -->
<div class="flex items-center p-3 rounded-lg bg-surface-light dark:bg-[#1d1c26] border border-slate-100 dark:border-slate-800/50">
<div class="flex flex-col items-center gap-1 mr-4 w-8">
<div class="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-600"></div>
<div class="w-0.5 h-4 bg-slate-200 dark:bg-slate-700"></div>
<div class="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
<div class="flex-1">
<p class="text-slate-800 dark:text-slate-200 font-medium">Student Center</p>
<p class="text-slate-500 dark:text-slate-500 text-xs">~ 10:55 AM</p>
</div>
</div>
<!-- Stop Item 2 -->
<div class="flex items-center p-3 rounded-lg bg-surface-light dark:bg-[#1d1c26] border border-slate-100 dark:border-slate-800/50">
<div class="flex flex-col items-center gap-1 mr-4 w-8">
<div class="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-600"></div>
<div class="w-0.5 h-4 bg-slate-200 dark:bg-slate-700"></div>
<div class="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
<div class="flex-1">
<p class="text-slate-800 dark:text-slate-200 font-medium">North Dorms</p>
<p class="text-slate-500 dark:text-slate-500 text-xs">~ 11:05 AM</p>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark dark:to-transparent z-20 max-w-md mx-auto">
<div class="flex gap-3 items-stretch">
<!-- SOS Button -->
<button class="flex shrink-0 w-14 items-center justify-center rounded-xl bg-danger/10 text-danger border border-danger/20 hover:bg-danger hover:text-white transition-all active:scale-95 shadow-sm">
<span class="material-symbols-outlined">sos</span>
</button>
<!-- Main Action Button -->
<button class="flex flex-1 items-center justify-center rounded-xl h-14 bg-primary text-white text-lg font-bold tracking-wide shadow-lg shadow-primary/30 hover:bg-primary/90 active:scale-95 transition-all">
<span class="mr-2 material-symbols-outlined">directions_bus</span>
                    Arrive at Stop
                </button>
</div>
<!-- Safe area spacing -->
<div class="h-1 w-full"></div>
</div>
</div>
</body></html>
