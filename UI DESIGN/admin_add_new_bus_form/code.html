<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TrackMate - Admin Add New Bus</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5048e5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for cleaner mobile look while retaining functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#121117] dark:text-white transition-colors duration-200 flex justify-center items-start min-h-screen">
<!-- Mobile Container (Max Width restricted for desktop viewing to simulate phone) -->
<div class="relative flex w-full max-w-[480px] flex-col bg-white dark:bg-gray-900 min-h-screen shadow-2xl overflow-hidden group/design-root">
<!-- Header -->
<div class="sticky top-0 z-20 flex items-center justify-between bg-white/95 dark:bg-gray-900/95 backdrop-blur-sm p-4 border-b border-gray-100 dark:border-gray-800">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-[#121117] dark:text-white">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-[#121117] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Add New Bus</h2>
</div>
<!-- Scrollable Form Area -->
<div class="flex-1 overflow-y-auto no-scrollbar pb-24">
<!-- Progress Indicator (Optional visual cue) -->
<div class="px-6 pt-6 pb-2">
<div class="h-1.5 w-full bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden">
<div class="h-full w-1/4 bg-primary rounded-full"></div>
</div>
<p class="text-xs text-gray-400 mt-2 font-medium uppercase tracking-wider">Vehicle Details</p>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-6 px-6 py-4">
<!-- Bus Number -->
<div class="flex flex-col gap-2">
<label class="text-[#121117] dark:text-gray-200 text-sm font-medium leading-normal">Bus Number</label>
<div class="relative group">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">directions_bus</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#121117] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dcdce5] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#656487] dark:placeholder:text-gray-500 pl-11 pr-4 text-base font-normal leading-normal transition-all shadow-sm" placeholder="e.g. B-42" value=""/>
</div>
</div>
<!-- License Plate -->
<div class="flex flex-col gap-2">
<label class="text-[#121117] dark:text-gray-200 text-sm font-medium leading-normal">License Plate</label>
<div class="relative group">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">pin</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#121117] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dcdce5] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#656487] dark:placeholder:text-gray-500 pl-11 pr-4 text-base font-normal leading-normal uppercase transition-all shadow-sm" placeholder="e.g. KA-01-AB-1234" value=""/>
</div>
<!-- Helper Text / Validation Placeholder -->
<p class="text-xs text-gray-500 dark:text-gray-400">Enter the official registration number.</p>
</div>
<!-- Split Row: Make & Capacity -->
<div class="flex gap-4">
<!-- Make & Model -->
<div class="flex flex-col gap-2 flex-[1.5]">
<label class="text-[#121117] dark:text-gray-200 text-sm font-medium leading-normal">Make &amp; Model</label>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#121117] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dcdce5] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#656487] dark:placeholder:text-gray-500 p-[15px] text-base font-normal leading-normal transition-all shadow-sm" placeholder="Tata Starbus" value=""/>
</div>
<!-- Seating Capacity -->
<div class="flex flex-col gap-2 flex-1">
<label class="text-[#121117] dark:text-gray-200 text-sm font-medium leading-normal">Capacity</label>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#121117] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dcdce5] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#656487] dark:placeholder:text-gray-500 p-[15px] text-center text-base font-normal leading-normal transition-all shadow-sm" placeholder="40" type="number" value=""/>
</div>
</div>
<!-- Operational Status -->
<div class="flex flex-col gap-3 pt-2">
<label class="text-[#121117] dark:text-gray-200 text-sm font-medium leading-normal">Operational Status</label>
<div class="bg-background-light dark:bg-gray-800 p-1.5 rounded-xl flex gap-1 shadow-inner">
<!-- Active State -->
<button class="flex-1 bg-white dark:bg-gray-700 text-primary dark:text-white shadow-sm rounded-lg py-2.5 text-sm font-semibold transition-all flex items-center justify-center gap-1.5 ring-1 ring-black/5 dark:ring-white/10">
<span class="w-2 h-2 rounded-full bg-green-500"></span>
                            Active
                        </button>
<!-- Inactive State -->
<button class="flex-1 text-gray-500 dark:text-gray-400 hover:bg-gray-200/50 dark:hover:bg-gray-700/50 rounded-lg py-2.5 text-sm font-medium transition-all flex items-center justify-center gap-1.5">
<span class="w-2 h-2 rounded-full bg-gray-400"></span>
                            Inactive
                        </button>
<!-- Maintenance State -->
<button class="flex-1 text-gray-500 dark:text-gray-400 hover:bg-gray-200/50 dark:hover:bg-gray-700/50 rounded-lg py-2.5 text-sm font-medium transition-all flex items-center justify-center gap-1.5">
<span class="w-2 h-2 rounded-full bg-amber-400"></span>
                            Maint.
                        </button>
</div>
</div>
</div>
<!-- Additional Info Area -->
<div class="px-6 mt-2">
<div class="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-900/50 flex gap-3 items-start">
<span class="material-symbols-outlined text-primary text-[20px] mt-0.5">info</span>
<p class="text-xs text-blue-800 dark:text-blue-200 leading-relaxed">
                        Newly added buses are automatically assigned to the "Unassigned" route until configured in the Routes module.
                    </p>
</div>
</div>
</div>
<!-- Sticky Footer Buttons -->
<div class="absolute bottom-0 left-0 w-full bg-white dark:bg-gray-900 border-t border-gray-100 dark:border-gray-800 p-4 pb-8 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] dark:shadow-none z-20">
<div class="flex flex-col gap-3">
<button class="flex w-full items-center justify-center rounded-xl bg-primary px-5 py-4 text-white font-bold tracking-wide shadow-lg shadow-primary/25 hover:bg-primary/90 hover:shadow-primary/40 active:scale-[0.98] transition-all">
                    Add Bus
                </button>
<button class="flex w-full items-center justify-center rounded-xl border border-gray-200 dark:border-gray-700 bg-transparent px-5 py-3.5 text-gray-700 dark:text-gray-300 font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 active:bg-gray-100 dark:active:bg-gray-700 transition-all">
                    Cancel
                </button>
</div>
</div>
</div>
</body></html>
