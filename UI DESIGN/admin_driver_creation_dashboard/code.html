<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Driver Creation Dashboard</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4b36e7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131121",
                        "surface-dark": "#1d1c26",
                        "border-dark": "#3f3c53",
                        "text-secondary-dark": "#a19db8",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Lexend', sans-serif; }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-white h-screen flex flex-col overflow-hidden selection:bg-primary selection:text-white">
<!-- Top Navigation Bar -->
<nav class="flex items-center px-4 py-4 justify-between shrink-0 bg-background-light dark:bg-background-dark z-30 sticky top-0">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-gray-200 dark:hover:bg-white/10 transition-colors active:scale-95">
<span class="material-symbols-outlined text-gray-900 dark:text-white" style="font-size: 24px;">arrow_back_ios_new</span>
</button>
<h2 class="text-xl font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10 truncate">Add New Driver</h2>
</nav>
<!-- Main Scrollable Content -->
<main class="flex-1 overflow-y-auto pb-32">
<div class="w-full max-w-lg mx-auto flex flex-col">
<!-- Profile Photo Upload Section -->
<div class="flex p-6 flex-col items-center gap-4">
<div class="relative group cursor-pointer">
<!-- Avatar Image -->
<div class="bg-center bg-no-repeat bg-cover rounded-full h-32 w-32 shadow-xl ring-4 ring-white dark:ring-surface-dark bg-gray-200 transition-transform group-hover:scale-105" data-alt="Placeholder image for driver profile photo upload" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAm_q2ilLkvBIpNvAWhdohHBskDs0qrOenRib8q6VNvqqiVi27jNeFo5KTlMy4vXNmFpC_SNCTTWCu2t3Bxe7_BMZuGzp5KGZh5B3YTfp7Xre_kXVBTQ9q1XoOJ7OCIeMfynns8NYs5pz8wCqJT2wHpDgMupLQ8qk6XOYhS5MTGxuwqRDLC5S2Cy5lW7jIlJyWvob2t4uMPOLIMUmXQQy9c6aWLT4kHO0zJNI_fkZVJnwJEWkqWpBTB71ww6VDts9LgvZNfRVbi_-0");'>
</div>
<!-- Camera Icon Overlay -->
<div class="absolute bottom-1 right-1 bg-primary text-white p-2.5 rounded-full shadow-lg flex items-center justify-center border-2 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-[20px]">photo_camera</span>
</div>
</div>
<div class="text-center">
<p class="text-xl font-bold leading-tight">Upload Photo</p>
<p class="text-gray-500 dark:text-text-secondary-dark text-sm mt-1">Tap to choose a profile image</p>
</div>
</div>
<!-- Form Section -->
<div class="px-5 flex flex-col gap-6 mt-2">
<!-- Full Name Input -->
<div class="flex flex-col gap-2">
<label class="text-base font-medium ml-1" for="fullName">Full Name</label>
<div class="relative">
<input class="form-input block w-full rounded-xl border-gray-300 dark:border-border-dark bg-white dark:bg-surface-dark h-14 px-4 text-base focus:border-primary focus:ring-primary dark:focus:ring-primary placeholder-gray-400 dark:placeholder-text-secondary-dark transition-all shadow-sm" id="fullName" placeholder="e.g. John Doe" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-text-secondary-dark pointer-events-none">person</span>
</div>
</div>
<!-- Employee ID Input -->
<div class="flex flex-col gap-2">
<label class="text-base font-medium ml-1" for="employeeId">Employee ID</label>
<div class="relative">
<input class="form-input block w-full rounded-xl border-gray-300 dark:border-border-dark bg-white dark:bg-surface-dark h-14 px-4 text-base focus:border-primary focus:ring-primary dark:focus:ring-primary placeholder-gray-400 dark:placeholder-text-secondary-dark transition-all shadow-sm" id="employeeId" inputmode="numeric" placeholder="Enter Employee ID" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-text-secondary-dark pointer-events-none">badge</span>
</div>
</div>
<!-- Grid for shorter inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Phone Number Input -->
<div class="flex flex-col gap-2">
<label class="text-base font-medium ml-1" for="phone">Phone Number</label>
<div class="relative">
<input class="form-input block w-full rounded-xl border-gray-300 dark:border-border-dark bg-white dark:bg-surface-dark h-14 px-4 text-base focus:border-primary focus:ring-primary dark:focus:ring-primary placeholder-gray-400 dark:placeholder-text-secondary-dark transition-all shadow-sm" id="phone" placeholder="(555) 000-0000" type="tel"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-text-secondary-dark pointer-events-none">call</span>
</div>
</div>
<!-- Email Address Input -->
<div class="flex flex-col gap-2">
<label class="text-base font-medium ml-1" for="email">Email Address</label>
<div class="relative">
<input class="form-input block w-full rounded-xl border-gray-300 dark:border-border-dark bg-white dark:bg-surface-dark h-14 px-4 text-base focus:border-primary focus:ring-primary dark:focus:ring-primary placeholder-gray-400 dark:placeholder-text-secondary-dark transition-all shadow-sm" id="email" placeholder="driver@college.edu" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-text-secondary-dark pointer-events-none">mail</span>
</div>
</div>
</div>
<!-- Assigned Route Dropdown -->
<div class="flex flex-col gap-2">
<label class="text-base font-medium ml-1" for="route">Assigned Bus Route</label>
<div class="relative">
<select class="form-select block w-full rounded-xl border-gray-300 dark:border-border-dark bg-white dark:bg-surface-dark h-14 pl-4 pr-10 text-base focus:border-primary focus:ring-primary dark:focus:ring-primary text-gray-900 dark:text-white transition-all shadow-sm cursor-pointer" id="route">
<option disabled="" selected="" value="">Select a route assignment</option>
<option value="route_a">Route A - North Campus Loop</option>
<option value="route_b">Route B - Downtown Express</option>
<option value="route_c">Route C - Engineering Shuttle</option>
<option value="route_d">Route D - Night Safety Ride</option>
</select>
</div>
<p class="text-xs text-gray-500 dark:text-text-secondary-dark ml-1">Assigning a route is optional and can be changed later.</p>
</div>
</div>
</div>
</main>
<!-- Sticky Footer Action -->
<footer class="fixed bottom-0 left-0 w-full bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md p-5 border-t border-gray-200 dark:border-white/5 z-40">
<div class="max-w-lg mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl text-lg shadow-lg shadow-primary/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
<span>Create Driver</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
