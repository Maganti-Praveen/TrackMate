<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live Bus Map</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4b36e7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131121",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e1c2e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom map styling simulation */
        .map-bg {
            background-color: #e5e7eb;
            background-image: 
                linear-gradient(90deg, transparent 95%, #ffffff 95%),
                linear-gradient(transparent 95%, #ffffff 95%);
            background-size: 80px 80px;
        }
        .dark .map-bg {
            background-color: #1f2937;
            background-image: 
                linear-gradient(90deg, transparent 95%, #374151 95%),
                linear-gradient(transparent 95%, #374151 95%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white h-screen overflow-hidden flex flex-col relative">
<!-- Background Map Layer -->
<div class="absolute inset-0 w-full h-full z-0 map-bg" data-alt="Abstract minimalist map background with grid lines" data-location="College Campus" style="https://placeholder.pics/svg/300">
<!-- Simulated Map Elements -->
<!-- Route Line (Polyline) -->
<svg class="absolute w-full h-full pointer-events-none" style="z-index: 1;">
<path class="opacity-80 drop-shadow-md" d="M-50,200 Q150,250 180,450 T450,650" fill="none" stroke="#4b36e7" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>
<path class="opacity-40" d="M200,800 Q250,550 480,450" fill="none" stroke="#94a3b8" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>
</svg>
<!-- Bus Stop Nodes -->
<div class="absolute top-[440px] left-[170px] w-3 h-3 bg-white border-2 border-[#4b36e7] rounded-full z-10 shadow-sm"></div>
<div class="absolute top-[640px] left-[440px] w-3 h-3 bg-white border-2 border-[#4b36e7] rounded-full z-10 shadow-sm"></div>
<!-- Interactive Bus Marker (Simulated) -->
<button class="absolute top-[340px] left-[175px] flex flex-col items-center justify-center z-20 transition-transform hover:scale-110">
<div class="bg-primary text-white p-2 rounded-full shadow-lg border-2 border-white dark:border-surface-dark relative">
<span class="material-symbols-outlined text-[20px]">directions_bus</span>
<div class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border border-white"></div>
</div>
<div class="bg-white dark:bg-surface-dark px-2 py-0.5 rounded-md shadow-md mt-1 text-[10px] font-bold text-slate-800 dark:text-white whitespace-nowrap">
                Bus 42
            </div>
</button>
<!-- Another Bus Marker -->
<button class="absolute top-[500px] left-[350px] flex flex-col items-center justify-center z-20 transition-transform opacity-70 grayscale">
<div class="bg-slate-500 text-white p-2 rounded-full shadow-lg border-2 border-white dark:border-surface-dark relative">
<span class="material-symbols-outlined text-[20px]">directions_bus</span>
</div>
<div class="bg-white dark:bg-surface-dark px-2 py-0.5 rounded-md shadow-md mt-1 text-[10px] font-bold text-slate-800 dark:text-white whitespace-nowrap">
                Bus 12
            </div>
</button>
</div>
<!-- UI Overlay Layer -->
<div class="relative z-30 flex flex-col h-full pointer-events-none">
<!-- Header Section -->
<header class="pt-12 px-4 pb-2 bg-gradient-to-b from-white/90 via-white/50 to-transparent dark:from-background-dark/90 dark:via-background-dark/50 pointer-events-auto">
<div class="flex items-center justify-between mb-4">
<button class="flex size-10 shrink-0 items-center justify-center bg-white dark:bg-surface-dark rounded-full shadow-sm text-slate-900 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">menu</span>
</button>
<div class="flex items-center gap-2 bg-white/80 dark:bg-surface-dark/80 backdrop-blur-md py-1.5 px-4 rounded-full shadow-sm border border-slate-100 dark:border-slate-800">
<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
<h1 class="text-sm font-bold tracking-tight text-slate-900 dark:text-white">Live Map</h1>
</div>
<button class="flex size-10 shrink-0 items-center justify-center overflow-hidden rounded-full bg-primary text-white shadow-sm hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined">person</span>
</button>
</div>
<!-- Search Bar -->
<div class="w-full">
<label class="flex flex-col w-full h-12 shadow-[0_4px_16px_rgba(0,0,0,0.08)] rounded-xl">
<div class="flex w-full flex-1 items-stretch rounded-xl h-full bg-white dark:bg-surface-dark backdrop-blur-sm border border-slate-100 dark:border-slate-800 transition-colors">
<div class="text-slate-400 dark:text-slate-500 flex items-center justify-center pl-4 pr-2">
<span class="material-symbols-outlined">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-0 border-none bg-transparent focus:border-none h-full placeholder:text-slate-400 dark:placeholder:text-slate-500 px-0 text-base font-normal leading-normal" placeholder="Search route or stop" value=""/>
<button class="pr-4 pl-2 text-primary">
<span class="material-symbols-outlined">tune</span>
</button>
</div>
</label>
</div>
<!-- Chips -->
<div class="flex gap-2 py-3 overflow-x-auto no-scrollbar mask-gradient-right">
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary text-white pl-4 pr-4 shadow-md transition-transform active:scale-95">
<span class="text-xs font-semibold">All Routes</span>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-surface-dark text-slate-700 dark:text-slate-200 border border-slate-100 dark:border-slate-700 pl-4 pr-4 shadow-sm transition-transform active:scale-95">
<span class="material-symbols-outlined text-[16px]">star</span>
<span class="text-xs font-medium">Favorites</span>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-surface-dark text-slate-700 dark:text-slate-200 border border-slate-100 dark:border-slate-700 pl-4 pr-4 shadow-sm transition-transform active:scale-95">
<span class="text-xs font-medium">North Campus</span>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-surface-dark text-slate-700 dark:text-slate-200 border border-slate-100 dark:border-slate-700 pl-4 pr-4 shadow-sm transition-transform active:scale-95">
<span class="text-xs font-medium">Express</span>
</button>
</div>
</header>
<!-- Spacer to push content down -->
<div class="flex-1 pointer-events-none"></div>
<!-- Bottom Controls & Sheet -->
<div class="pb-6 px-4 pointer-events-auto flex flex-col items-end gap-4">
<!-- Map Controls -->
<div class="flex flex-col gap-2 mb-2">
<button class="flex size-12 items-center justify-center rounded-xl bg-white dark:bg-surface-dark text-slate-900 dark:text-white shadow-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">layers</span>
</button>
<button class="flex size-12 items-center justify-center rounded-xl bg-white dark:bg-surface-dark text-primary shadow-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors group">
<span class="material-symbols-outlined group-active:animate-ping">my_location</span>
</button>
</div>
<!-- Bottom Sheet Card -->
<div class="w-full bg-white dark:bg-surface-dark rounded-2xl shadow-[0_-4px_24px_rgba(0,0,0,0.1)] p-5 animate-slide-up cursor-grab active:cursor-grabbing">
<!-- Drag Handle -->
<div class="w-full flex justify-center mb-4">
<div class="w-10 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
</div>
<!-- Bus Summary Header -->
<div class="flex justify-between items-start mb-4">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="bg-primary/10 text-primary px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wider">Blue Line</span>
<span class="text-xs text-slate-500 dark:text-slate-400 font-medium flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> On Time
                            </span>
</div>
<h2 class="text-xl font-bold text-slate-900 dark:text-white leading-tight">North Campus Shuttle</h2>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Next stop: Student Union</p>
</div>
<div class="flex flex-col items-end">
<div class="text-2xl font-bold text-primary">3 min</div>
<span class="text-xs text-slate-400 font-medium">Est. Arrival</span>
</div>
</div>
<!-- Progress/Timeline -->
<div class="relative py-2 pl-2">
<div class="absolute left-[7px] top-4 bottom-2 w-0.5 bg-slate-100 dark:bg-slate-700"></div>
<!-- Current Location -->
<div class="flex items-center gap-3 mb-4 relative z-10">
<div class="w-4 h-4 rounded-full bg-primary border-[3px] border-white dark:border-surface-dark shadow-sm"></div>
<div class="flex-1">
<p class="text-sm font-semibold text-slate-900 dark:text-white">Library</p>
<p class="text-xs text-slate-500">Departed 10:42 AM</p>
</div>
</div>
<!-- Destination -->
<div class="flex items-center gap-3 relative z-10">
<div class="w-4 h-4 rounded-full bg-white dark:bg-slate-600 border-[3px] border-slate-200 dark:border-slate-500"></div>
<div class="flex-1">
<p class="text-sm font-semibold text-slate-400 dark:text-slate-500">Student Union</p>
<div class="flex items-center gap-2 mt-1">
<span class="text-xs bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 px-1.5 py-0.5 rounded">Seats Available</span>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="mt-5">
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl flex items-center justify-center gap-2 transition-colors">
<span>View Full Schedule</span>
<span class="material-symbols-outlined text-[20px]">calendar_month</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
