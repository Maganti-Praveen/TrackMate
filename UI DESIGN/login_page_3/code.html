<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TrackMate Login</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4f44e9",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                        "card-dark": "#1a1a2e", // Slightly lighter than background-dark for elevation
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col justify-center items-center p-4 antialiased transition-colors duration-300">
<!-- Login Card Container -->
<div class="w-full max-w-[400px] bg-white dark:bg-card-dark rounded-xl shadow-lg border border-gray-100 dark:border-gray-800 relative overflow-hidden group/design-root">
<!-- Decorative Top Bar -->
<div class="h-1.5 w-full bg-gradient-to-r from-primary to-purple-500"></div>
<!-- Header Section -->
<div class="flex flex-col items-center pt-8 pb-4 px-6 text-center">
<!-- Logo Icon -->
<div class="flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 mb-4 text-primary">
<span class="material-symbols-outlined text-[32px]" data-icon="directions_bus">directions_bus</span>
</div>
<!-- Headlines -->
<h1 class="text-gray-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight">TrackMate</h1>
<p class="text-gray-500 dark:text-gray-400 text-base font-normal leading-normal mt-2">Enter your credentials to access the bus schedule.</p>
</div>
<!-- Form Section -->
<div class="px-6 py-4">
<form action="#" class="flex flex-col gap-5">
<!-- Username Field -->
<label class="flex flex-col gap-2">
<span class="text-gray-900 dark:text-white text-sm font-medium leading-normal">Username / Student ID</span>
<div class="relative group">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">badge</span>
</span>
<input autocomplete="username" class="form-input block w-full rounded-lg border border-[#dcdce5] dark:border-gray-700 bg-white dark:bg-[#252538] text-gray-900 dark:text-white pl-11 pr-4 h-12 focus:border-primary focus:ring-2 focus:ring-primary/20 placeholder:text-gray-400 text-base transition-all" placeholder="e.g. jdoe123" type="text"/>
</div>
</label>
<!-- Password Field -->
<label class="flex flex-col gap-2">
<span class="text-gray-900 dark:text-white text-sm font-medium leading-normal">Password</span>
<div class="relative group">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input autocomplete="current-password" class="form-input block w-full rounded-lg border border-[#dcdce5] dark:border-gray-700 bg-white dark:bg-[#252538] text-gray-900 dark:text-white pl-11 pr-12 h-12 focus:border-primary focus:ring-2 focus:ring-primary/20 placeholder:text-gray-400 text-base transition-all" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-1">
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
</label>
<!-- Action Button -->
<button class="mt-2 w-full flex items-center justify-center bg-primary hover:bg-primary/90 text-white font-semibold h-12 rounded-lg shadow-md shadow-primary/20 hover:shadow-lg hover:shadow-primary/30 active:scale-[0.98] transition-all duration-200 text-base" type="submit">
                    Sign In
                </button>
</form>
</div>
<!-- Footer -->
<div class="bg-gray-50 dark:bg-[#151525] px-6 py-5 text-center border-t border-gray-100 dark:border-gray-800 mt-2">
<p class="text-sm text-gray-500 dark:text-gray-400">
                Need an account? 
                <a class="font-medium text-primary hover:text-primary/80 transition-colors" href="#">Contact Admin</a>
</p>
</div>
</div>
<!-- Bottom info -->
<div class="mt-8 flex flex-col items-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
<div class="flex items-center gap-1.5 text-xs font-medium text-gray-500 dark:text-gray-400">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span>Protected by College IT Services</span>
</div>
</div>
</body></html>
