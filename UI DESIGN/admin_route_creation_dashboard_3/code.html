<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Route Creation Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4b36e7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131121",
                        "surface-dark": "#1d1c26",
                        "surface-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Lexend", "Noto Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased overflow-hidden">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-4 py-4 bg-background-light dark:bg-background-dark z-20 sticky top-0">
<button class="text-base font-medium text-slate-500 dark:text-[#a19db8] hover:text-primary transition-colors focus:outline-none">
                Cancel
            </button>
<h1 class="text-lg font-bold leading-tight tracking-tight">Create Route</h1>
<div class="w-[50px]"></div> <!-- Spacer to balance center title -->
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 overflow-y-auto pb-28 no-scrollbar scroll-smooth">
<!-- Route Name Input -->
<div class="px-4 py-2">
<label class="block group">
<span class="text-sm font-medium text-slate-500 dark:text-[#a19db8] ml-1 mb-2 block group-focus-within:text-primary transition-colors">Route Name</span>
<input class="w-full bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700/50 rounded-xl px-4 py-3.5 text-base font-medium focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent shadow-sm placeholder:text-slate-400 dark:placeholder:text-slate-600 transition-all" placeholder="e.g., North Campus Shuttle" type="text"/>
</label>
</div>
<!-- Map Section -->
<div class="mt-4 px-4">
<div class="relative w-full aspect-[4/3] rounded-2xl overflow-hidden shadow-lg border border-slate-200 dark:border-white/5 bg-slate-900 group">
<!-- Map Image Background with Filters -->
<div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-105" data-alt="Dark stylized map view of city streets and blocks" data-location="College Campus Area" style="background-image: url('https://placeholder.pics/svg/300'); filter: grayscale(100%) invert(85%) contrast(110%);">
</div>
<!-- Dark mode tint overlay for map to make it fit theme -->
<div class="absolute inset-0 bg-indigo-900/20 mix-blend-multiply dark:bg-indigo-950/40"></div>
<!-- Route Line SVG Simulation -->
<svg class="absolute inset-0 w-full h-full pointer-events-none z-[5]">
<!-- Shadow path for depth -->
<path d="M 80 200 Q 150 140 220 170 T 320 120" fill="none" stroke="black" stroke-linecap="round" stroke-opacity="0.2" stroke-width="6" transform="translate(2,2)"></path>
<!-- Actual Route Line -->
<path class="drop-shadow-lg opacity-90" d="M 80 200 Q 150 140 220 170 T 320 120" fill="none" stroke="#4b36e7" stroke-dasharray="8 4" stroke-linecap="round" stroke-width="4"></path>
</svg>
<!-- Pins Container -->
<div class="absolute inset-0 z-10">
<!-- Pin 1: Start -->
<div class="absolute left-[80px] top-[200px] -translate-x-1/2 -translate-y-full flex flex-col items-center group/pin">
<div class="opacity-0 group-hover/pin:opacity-100 transition-opacity bg-surface-dark text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-lg mb-1 whitespace-nowrap border border-white/10">Start Point</div>
<div class="relative">
<span class="material-symbols-outlined text-primary text-3xl drop-shadow-md">location_on</span>
<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-2 h-1 bg-black/30 rounded-full blur-[1px]"></div>
</div>
</div>
<!-- Pin 2: Midpoint -->
<div class="absolute left-[220px] top-[170px] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="w-3 h-3 bg-white border-[3px] border-primary rounded-full shadow-md z-10"></div>
</div>
<!-- Pin 3: End/Active -->
<div class="absolute left-[320px] top-[120px] -translate-x-1/2 -translate-y-full flex flex-col items-center">
<div class="bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-lg shadow-lg mb-1 whitespace-nowrap flex items-center gap-1">
<span>Main Gate</span>
<span class="material-symbols-outlined text-[10px]">edit</span>
</div>
<span class="material-symbols-outlined text-primary text-4xl drop-shadow-xl animate-bounce">location_on</span>
</div>
</div>
<!-- Map Controls -->
<div class="absolute bottom-3 right-3 flex flex-col gap-2 z-20">
<button class="w-10 h-10 bg-surface-light dark:bg-surface-dark rounded-xl flex items-center justify-center shadow-lg text-slate-700 dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 border border-slate-200 dark:border-white/5">
<span class="material-symbols-outlined text-xl">my_location</span>
</button>
</div>
</div>
<p class="text-xs font-medium text-center mt-3 text-slate-400 dark:text-slate-500 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-sm">info</span>
                    Tap map to drop pin or drag markers to move
                </p>
</div>
<!-- Stops List Header -->
<div class="mt-8 flex items-end justify-between px-4 pb-2 border-b border-slate-100 dark:border-white/5 mx-4">
<h3 class="text-lg font-bold text-slate-800 dark:text-white">Stops (3)</h3>
<span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Sequence</span>
</div>
<!-- Stop Cards List -->
<div class="px-4 mt-4 flex flex-col gap-3">
<!-- Stop Card 1 -->
<div class="relative group flex items-center gap-3 p-3 bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm border border-slate-100 dark:border-white/5 hover:border-primary/50 transition-all select-none">
<div class="cursor-grab active:cursor-grabbing text-slate-300 dark:text-slate-600 hover:text-primary p-1">
<span class="material-symbols-outlined">drag_indicator</span>
</div>
<div class="h-12 w-12 rounded-xl bg-cover bg-center shrink-0 bg-slate-200 ring-1 ring-black/5 dark:ring-white/10" data-alt="Library entrance with large glass windows" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBY0BgG2F4bf4dk3arOZn-6NseTOaDURAvTbIBDBOm8Grs6FYuYx-BGhmzRY1zT8MMPFSfY-3EZY1s_pqxatWmLeN7KGvdlq182CHTlUxz-DMUYEVkVhpWPzBvOnzjMaZqiIzCNjCityMwoGelCQlZVz0q0XlJrAO_tDvBVGouvdkIPwNnET4N1sFtVueFBMoR52xUfZ9Efn2T284SqY0Puz9KXTj7JRza0zC2FP4y4IZ3RgUIwfOQGpQVVViYJ_2DVe2NbfoptItI');">
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<div class="flex items-center gap-2">
<p class="font-bold text-slate-900 dark:text-white truncate text-base">Library Entrance</p>
</div>
<div class="flex items-center gap-2 mt-0.5">
<span class="text-xs font-semibold bg-primary/10 text-primary px-1.5 py-0.5 rounded">07:00 AM</span>
<span class="text-xs text-slate-400 dark:text-slate-500">• Pick up</span>
</div>
</div>
<button class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-500/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<!-- Stop Card 2 -->
<div class="relative group flex items-center gap-3 p-3 bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm border border-slate-100 dark:border-white/5 hover:border-primary/50 transition-all select-none">
<div class="cursor-grab active:cursor-grabbing text-slate-300 dark:text-slate-600 hover:text-primary p-1">
<span class="material-symbols-outlined">drag_indicator</span>
</div>
<div class="h-12 w-12 rounded-xl bg-cover bg-center shrink-0 bg-slate-200 ring-1 ring-black/5 dark:ring-white/10" data-alt="Modern engineering building with concrete facade" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCCDx5dbO3s-a7lEw3jwy4W_sB7uk1Rmz3Yt5Kgzgo44oMu1eVCSJiA1YRPaE1q3zIvTYI8UoyiQlBXIfb79AMy8oio_PuABUiV5LsV_c4dY1-DMohCf1AEkUN07J1IxqDxf2kz0sD8e9e1QUUR59OzVDgbFu0TOibR2s5uRkywy_KUwja4Oh7bCtbM23y4OuoIixqTxkd3M3ZYXPnE6nRVJe5gMIF20q2VfblThwWPfcEBCg3varMD04gWNdIdbhODP-0--ybDjw8');">
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<div class="flex items-center gap-2">
<p class="font-bold text-slate-900 dark:text-white truncate text-base">Engineering Block</p>
</div>
<div class="flex items-center gap-2 mt-0.5">
<span class="text-xs font-semibold bg-primary/10 text-primary px-1.5 py-0.5 rounded">07:15 AM</span>
<span class="text-xs text-slate-400 dark:text-slate-500">• Stop</span>
</div>
</div>
<button class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-500/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<!-- Stop Card 3 -->
<div class="relative group flex items-center gap-3 p-3 bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm border border-slate-100 dark:border-white/5 hover:border-primary/50 transition-all select-none">
<div class="cursor-grab active:cursor-grabbing text-slate-300 dark:text-slate-600 hover:text-primary p-1">
<span class="material-symbols-outlined">drag_indicator</span>
</div>
<div class="h-12 w-12 rounded-xl bg-cover bg-center shrink-0 bg-slate-200 ring-1 ring-black/5 dark:ring-white/10" data-alt="University main gate security entrance" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAI9foyjzBnZOEHm1BUTo2ShUkWZvHujMUXt20NSiBSspanX6v44Ggr09JoagLBa6qOkjg97R7yz6RytgEd-LvgETJpqeLRdntjtiol_uum8UEoOKPqAtXq7Sk79YGSrUVhAPnb70gMXBg6tyyAbhxkIIyydlhUHfRe430LoUvGf36R41bucEV9bkxRU7-wtt5IXSyfukIJF6XkwlnxK-Ha0r7w1mh1wEiK2ISlECcSzum3k7Swkerk0jn7BBlWHBQiVBoGA2l8ikA');">
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<div class="flex items-center gap-2">
<p class="font-bold text-slate-900 dark:text-white truncate text-base">Main Gate</p>
</div>
<div class="flex items-center gap-2 mt-0.5">
<span class="text-xs font-semibold bg-primary/10 text-primary px-1.5 py-0.5 rounded">07:30 AM</span>
<span class="text-xs text-slate-400 dark:text-slate-500">• Drop off</span>
</div>
</div>
<button class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-500/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<!-- Add Stop Button (List context) -->
<button class="group flex items-center justify-center gap-2 p-4 mt-2 rounded-2xl border-2 border-dashed border-slate-200 dark:border-white/10 text-slate-500 dark:text-slate-400 hover:border-primary hover:bg-primary/5 hover:text-primary transition-all active:scale-[0.98]">
<div class="w-8 h-8 rounded-full bg-slate-100 dark:bg-white/5 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-lg">add</span>
</div>
<span class="font-medium">Add stop manually</span>
</button>
</div>
</main>
<!-- Sticky Bottom Action Bar -->
<div class="absolute bottom-0 left-0 right-0 p-4 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-t border-slate-200 dark:border-white/5 z-30">
<button class="w-full bg-primary hover:bg-indigo-600 text-white font-bold text-lg py-4 rounded-2xl shadow-xl shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined group-hover:animate-pulse">check</span>
                Save Route
            </button>
</div>
</div>
</body></html>
